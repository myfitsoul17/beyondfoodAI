<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Beyond Food — AI Chat Widget Demo</title>
<link rel="stylesheet" href="/chat-widget.css">
<style>
  body{
    font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
    background:#fdfcfa; color:#1b1b18; margin:0; padding:60px 24px;
  }
  .demo-wrap{ max-width:640px; margin:0 auto; text-align:center; }
  h1{ color:#12281c; font-size:26px; }
  p{ color:#6b6b64; font-size:14px; }
  code{ background:#eaf3ea; padding:2px 6px; border-radius:4px; }
</style>
</head>
<body>
  <div class="demo-wrap">
    <h1>Beyond Food website (demo page)</h1>
    <p>This page stands in for any page on your real site. The chat widget below is loaded from
       <code>chat-widget.js</code> and talks only to your own backend at <code>/api/chat</code> —
       never directly to OpenAI.</p>
    <p>Click the <strong>"Ask AI"</strong> button in the bottom-right corner to try it.</p>
  </div>

  <script>
    // Point this at wherever server.js is running.
    window.BEYOND_FOOD_CHAT_API = "http://localhost:3001/api/chat";
  </script>
  <script src="/chat-widget.js"></script>
</body>
</html>
